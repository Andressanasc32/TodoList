<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <ul class="bolinhas">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="login-container">
        <div class="login-box">
            <h2>Bem-vindo de volta</h2>
            <p class="subtitle">Insira suas credenciais para acessar o painel</p>
            
            <form id="formlogin">
                <div class="input-wrapper">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-wrapper">
                    <label for="senha">Senha de acesso</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Entrar no sistema</button>
            </form>

            <div class="login-footer">
                Não tem uma conta? <a href="cadastro_usu.html">Cadastre-se</a>
            </div>
        </div>

        <div class="login-sidebar">
            <img src="woman-laptop-standing.png" alt="Ilustração de login">
        </div>
    </div>


</body>
<script src="login.js"></script>
</html>
