<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Cadastrar Atividade</title>
</head>
<body class="bg-light m-0 p-0">

<div id="conteudo-painel" class="d-none flex-column vh-100">
    
    <nav class="navbar navbar-expand-lg navbar-light bg-body-secondary w-100 px-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Minha App</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-3">
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="painel_usuario.html">Painel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="#">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger fw-bold" href="login.html">Sair</a>
                    </li>
                </ul>
                <form class="d-flex ms-auto" role="search">
                    <input class="form-control me-2" type="search" placeholder="Pesquisar..." aria-label="Search">
                    <button class="btn btn-success fw-bold" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="content-wrapper d-flex flex-column align-items-center justify-content-center flex-grow-1 w-100 py-4">
        
        <div class="container w-50 bg-white p-4 rounded shadow-sm">
            <h2 class="text-center mb-4 text-dark fw-bold">Cadastrar Nova Atividade</h2>
            
            <form id="formcadatividades">
                <div class="mb-3">
                    <label for="titulo" class="form-label fw-bold">Título da Atividade</label>
                    <input type="text" class="form-control" id="titulo" placeholder="Ex: Estudar Python">
                </div>
                <div class="mb-3">
                    <label for="descricao" class="form-label fw-bold">Descrição</label>
                    <textarea class="form-control" id="descricao" rows="3" placeholder="Ex: Revisar rotas do FastAPI..."></textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success fw-bold">Salvar Atividade</button>
                    <a href="painel_usuario.html" class="btn btn-outline-danger fw-bold">Voltar</a>
                </div>
            </form>
        </div>

    </div> </div>

<script src="atividade_cadastro.js"></script>
</body>
</html>
