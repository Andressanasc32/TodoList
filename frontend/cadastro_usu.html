<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Sistema Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cadastro_usu.css">
</head>
<body>

    <ul class="bolinhas">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="cadastro-container">
        <div class="cadastro-box">
            <h2>Crie sua conta</h2>
            <p class="subtitle">Preencha os campos abaixo para iniciar</p>
            
            <form id="formCadastro">
                <div class="input-wrapper">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>

                <div class="input-wrapper">
                    <label for="email">E-mail corporativo</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-wrapper">
                    <label for="senha">Senha de acesso</label>
                    <input type="password" id="senha" placeholder="••••••••"autocomplete="new-password" required>
                </div>
                
                <button type="submit" class="btn-primary">Registrar conta</button>
            </form>

            <div class="cadastro-footer">
                Já possui uma conta? <a href="login.html">Faça login</a>
            </div>
        </div>

        <div class="cadastro-sidebar">
            <img src="woman-laptop-standing.png" alt="Ilustração de cadastro">
        </div>
    </div>

    <script src="cadastro_usu_scripts.js"></script>
</body>
</html>
